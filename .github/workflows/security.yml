name: security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 4 * * 1" # weekly, Monday morning

permissions:
  contents: read

jobs:
  python-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: pip-audit backend dependencies
        run: |
          # Keep the audit environment itself current so pip-audit reports our
          # dependencies, not stale runner tooling (e.g. old setuptools).
          pip install --upgrade pip setuptools
          pip install pip-audit
          pip install -e backend
          pip-audit --skip-editable

  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: npm audit (production deps, high+)
        working-directory: frontend
        run: npm audit --omit=dev --audit-level=high

  trivy-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
