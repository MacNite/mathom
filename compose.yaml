# mathom
# CPU stack. For NVIDIA GPUs: docker compose -f compose.yaml -f compose.gpu.yaml up -d
#
# Two containers: the single mathom image (frontend + backend + nginx) and
# Ollama. Only mathom publishes a port; Ollama stays on the internal network.

name: mathom

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: mathom:latest
    restart: unless-stopped
    ports:
      # Bind to loopback by default. With auth disabled (the default) mathom has
      # no login, so it must not be reachable beyond the host out of the box.
      # Set MATHOM_BIND=0.0.0.0 for LAN access — only behind a VPN/authenticating
      # reverse proxy, or with Authentik SSO enabled. See docs/deployment.md.
      - "${MATHOM_BIND:-127.0.0.1}:${MATHOM_PORT:-8080}:8080"
    environment:
      MATHOM_DATA_DIR: /data
      MATHOM_OLLAMA_BASE_URL: http://ollama:11434
      MATHOM_OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      MATHOM_WHISPER_MODEL: ${WHISPER_MODEL:-small}
      MATHOM_WHISPER_DEVICE: ${WHISPER_DEVICE:-cpu}
      MATHOM_WHISPER_COMPUTE_TYPE: ${WHISPER_COMPUTE_TYPE:-int8}
      MATHOM_MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-200}
      # Optional user management + Authentik SSO (disabled by default).
      MATHOM_AUTH_ENABLED: ${AUTH_ENABLED:-false}
      MATHOM_SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-true}
      MATHOM_SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-336}
      MATHOM_PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      MATHOM_AUTH_OWNER_EMAIL: ${AUTH_OWNER_EMAIL:-}
      MATHOM_AUTHENTIK_ISSUER: ${AUTHENTIK_ISSUER:-}
      MATHOM_AUTHENTIK_CLIENT_ID: ${AUTHENTIK_CLIENT_ID:-}
      MATHOM_AUTHENTIK_CLIENT_SECRET: ${AUTHENTIK_CLIENT_SECRET:-}
      MATHOM_AUTHENTIK_SCOPES: ${AUTHENTIK_SCOPES:-openid profile email}
    volumes:
      - mathom-data:/data
      - whisper-models:/models
    depends_on:
      ollama:
        condition: service_started
    networks:
      - mathom
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  ollama:
    # Pinned for reproducible, auditable deployments. Bump deliberately;
    # override with OLLAMA_IMAGE if you track a different release.
    image: ${OLLAMA_IMAGE:-ollama/ollama:0.32.1}
    restart: unless-stopped
    # No ports: Ollama is only reachable on the internal network.
    volumes:
      - ollama-models:/root/.ollama
    networks:
      - mathom
    healthcheck:
      test: ["CMD", "ollama", "ps"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  mathom:

volumes:
  mathom-data:
  ollama-models:
  whisper-models:
