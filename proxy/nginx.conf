# Mathom proxy — the single public entry point.
# Serves the built frontend and forwards /api to the backend.
# Ollama is never reachable from here.

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Uploads can be large audio files.
    client_max_body_size 256m;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "same-origin" always;
    # The frontend is fully self-contained (no CDNs, fonts, or external calls),
    # so everything is locked to 'self'. 'unsafe-inline' is needed only for
    # React's inline style attributes; scripts stay strict.
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; img-src 'self' data:; font-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; media-src 'self'; manifest-src 'self'; worker-src 'self'" always;
    # Only effective once Mathom is served over HTTPS (browsers ignore it over
    # plain HTTP), so it is safe to send unconditionally.
    add_header Strict-Transport-Security "max-age=31536000" always;

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Transcription and summarization can take a while.
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_request_buffering off;
    }

    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # The service worker must always be revalidated so PWA updates ship
    # promptly, and it is allowed to control the whole origin scope.
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Service-Worker-Allowed "/" always;
        default_type application/javascript;
    }

    location = /manifest.webmanifest {
        default_type application/manifest+json;
        add_header Cache-Control "public, max-age=3600" always;
    }

    # SPA fallback: every other route is handled by the frontend router.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
