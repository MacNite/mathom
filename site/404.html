<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page not found — Mathom</title>
    <link rel="icon" type="image/png" href="./assets/favicon-192.png" />
    <link rel="stylesheet" href="./styles.css" />
    <style>
      .nf {
        min-height: 80vh;
        display: grid;
        place-items: center;
        text-align: center;
        padding: 2rem;
      }
      .nf img { width: 180px; margin: 0 auto 1.5rem; }
      .nf h1 { font-size: clamp(2rem, 5vw, 3rem); margin: 0 0 0.5rem; }
      .nf p { color: var(--ink-700); font-size: 1.1rem; margin: 0 0 1.75rem; }
    </style>
  </head>
  <body>
    <main class="nf">
      <div>
        <img src="./assets/bag-icon.png" alt="Mathom bag" />
        <span class="eyebrow">404</span>
        <h1>This mathom isn't on the shelf</h1>
        <p>The page you were looking for has wandered off. Let's head home.</p>
        <a class="btn btn-primary" href="./">Back to the mathom</a>
      </div>
    </main>
  </body>
</html>
