<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mathom — Interactive Demo</title>
    <meta
      name="description"
      content="A static, click-around demo of mathom. All data is fake and lives in your browser; no backend, no network."
    />
    <link rel="icon" type="image/png" href="./assets/favicon-192.png" />
    <meta name="theme-color" content="#b45f21" />
    <link rel="stylesheet" href="./demo.css" />
  </head>
  <body>
    <div class="demo-banner">
      <span>🧪 <strong data-i18n="demo.badge">Demo mode</strong> <span data-i18n="demo.bannerRest">— sample data, all in your browser. Nothing is uploaded or transcribed here.</span></span>
      <a href="./index.html" data-i18n="demo.backToSite">← Back to site</a>
      <a href="https://github.com/MacNite/mathom" data-i18n="demo.runReal">Run the real thing ↗</a>
    </div>

    <div class="app">
      <aside class="sidebar">
        <div class="sidebar-brand">
          <img src="./assets/bag-icon.png" alt="Mathom logo" />
          <div>
            <h1>Mathom</h1>
            <p data-i18n="app.tagline">mathom</p>
          </div>
        </div>
        <nav class="nav" id="nav">
          <a data-view="library" class="active"><span aria-hidden="true">📚</span> <span data-i18n="nav.library">Library</span></a>
          <a data-view="collections"><span aria-hidden="true">🗂️</span> <span data-i18n="nav.collections">Collections</span></a>
          <a data-view="timeline"><span aria-hidden="true">🗓️</span> <span data-i18n="nav.timeline">Timeline</span></a>
          <a data-view="templates"><span aria-hidden="true">✒️</span> <span data-i18n="nav.templates">Templates</span></a>
        </nav>
        <div class="lang-picker">
          <label>
            <span aria-hidden="true">🌐</span>
            <span class="sr-only" data-i18n="language.label">Language</span>
            <select id="lang-select" class="select" data-i18n-aria="language.label" aria-label="Language"></select>
          </label>
        </div>
        <div class="sidebar-foot">
          <p data-i18n="demo.sidebarNote">This is a guided sample of the app.</p>
          <a href="https://github.com/MacNite/mathom">
            <span aria-hidden="true">⭐</span> <span data-i18n="demo.starGitHub">Star on GitHub</span>
          </a>
        </div>
      </aside>

      <main class="main" id="main"><!-- rendered by demo.js --></main>
    </div>

    <div class="toast-wrap" id="toasts" aria-live="polite"></div>

    <script src="./demo.js"></script>
  </body>
</html>
